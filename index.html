<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="registration like facebook" />
    <meta name="keywords" content="forms,registration,html/css" />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />
    <title>forms2</title>
  </head>
  <body>


   <!-- ბოდიში გამომრჩა წინა დავალებაში ეს facebook ის ლოგინი და გიგზავნით ახლიდან -->


    <div class="container">
      <h1>Registration form</h1>

      <form>
        <div class="form-group">
          <label for="firstname">First name</label>
          <input type="text" id="firstname" required />
        </div>

        <div class="form-group">
          <label for="lastname">Last Name</label>
          <input type="text" id="lastname" required />
        </div>

        <div class="form-group">
          <label for="nickname">Nick name</label>
          <input type="text" id="nickname" required />
        </div>

        <div class="form-group">
          <label for="email">e-mail</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="passwd">password</label>
          <input type="password" id="passwd" required />
        </div>

        <div class="form-group">
          <label for="date">Date of Birth</label>
          <input type="text" id="date" required />
          <!-- <input type="date"> -->
        </div>

        <div class="form-group">
          <div class="radio-group">
            <label for="gender">Gender</label>
            <input type="radio" name="gender" id="m" />
            <label for="m">Male</label>
            <input type="radio" name="gender" id="f" />
            <label for="f">Female</label>
          </div>
        </div>

        <div class="form-group">
          <label for="mobile">Mobile</label>
          <input type="number" placeholder="+99523424204" id="mobile" required />
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <textarea name="" id="address" cols="30" rows="5"></textarea>
        </div>

        <div class="button-group">
          <button>Submit</button>
          <button class="reset">reset</button>
        </div>
      </form>
    </div>
  </body>
</html>
