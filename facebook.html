<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="registration like facebook" />
    <meta name="keywords" content="forms,registration,html/css" />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./facebook.css">
    <title>facebook login</title>
</head>
<body>

    <button><a href="./index.html">Registration form</a></button>



    <div class="container">
        <div class="left-side">
            <img src="./images/facebook logo.png" alt="Facebook Logo" class="logo">
            <h2>Facebook-ი გაძლევთ საშუალებას დაუკავშირდეთ და იურთიერთოთ ხალხთან თქვენს ცხოვრებაში.</h2>
        </div>

        <div class="right-side">
            <div class="login-box">
                <form>
                    <input type="text" placeholder="ელფოსტა ან ტელეფონის ნომერი" required>
                    <input type="password" placeholder="პაროლი" required> <br>
                    <button type="submit" class="login-btn">შესვლა</button><br>
                    <button type="button" class="forgot-password-btn">პაროლი დაგავიწყდათ?</button>
                    <!-- <hr> -->
                    <button type="button" class="create-account-btn">ახალი ანგარიშის შექმნა</button>
                </form>

            </div>
            <p class="bottom-text"><b>გვერდის შექმნა</b> პოპულარული ადამიანებისთვის, ჯგუფებისთვის ან ბიზნესისთვის.</p>
            
        </div>
    </div>



    
</body>
</html>
